
  <!DOCTYPE html>

      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <link rel="icon" type="image/png" href="/logo.png" />
      <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://*.google.com https://*.run.app https://cdn.jsdelivr.net https://vercel.live https://*.vercel.live https://vercel.com; connect-src 'self' https: wss: https://*.run.app https://*.googleapis.com https://*.google-analytics.com https://vercel.live https://*.vercel.live https://vercel.com wss://*.vercel.live; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.gstatic.com https://vercel.live https://*.vercel.live; font-src 'self' https://fonts.gstatic.com https://*.vercel.live; img-src 'self' data: https: blob:; worker-src 'self' blob:;">
      <title>Payroll Hub</title>
      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
      <script>
        window.addEventListener('error', function(e) {
          if (
            e.message === 'Script error.' ||
            e.message === 'ResizeObserver loop limit exceeded' ||
            e.message === 'ResizeObserver loop completed with undelivered notifications.'
          ) {
            e.stopImmediatePropagation();
          }
        });
        window.addEventListener('unhandledrejection', function(e) {
          if (e.reason && e.reason.message && e.reason.message.includes('ResizeObserver')) {
            e.stopImmediatePropagation();
          }
        });
      </script>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
